name: Publish to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.0.13)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must match vX.Y.Z (e.g. v0.0.13)"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update version and create tag
        run: |
          SEMVER="${{ inputs.version }}"
          SEMVER="${SEMVER#v}"
          sed -i "s/adshield-android:[0-9]*\.[0-9]*\.[0-9]*/adshield-android:${SEMVER}/" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README version to ${SEMVER}"
          git tag "${{ inputs.version }}"
          git push origin main "${{ inputs.version }}"

      - name: Publish to Maven Central
        run: |
          SEMVER="${{ inputs.version }}"
          SEMVER="${SEMVER#v}"
          ./gradlew publishAllPublicationsToMavenCentralRepository -Pversion=${SEMVER}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ""
